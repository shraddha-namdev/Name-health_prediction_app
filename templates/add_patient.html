<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
</head>
<body>

<h2>Add Patient</h2>

<form method="POST">

    <input type="text" name="full_name" placeholder="Full Name" required><br><br>

    <input type="date" name="dob" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input type="number" step="0.1" name="glucose" placeholder="Glucose" required><br><br>

    <input type="number" step="0.1" name="haemoglobin" placeholder="Haemoglobin" required><br><br>

    <input type="number" step="0.1" name="cholesterol" placeholder="Cholesterol" required><br><br>

    <button type="submit">Save Patient</button>

</form>

</body>
</html>
