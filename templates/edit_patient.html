<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edit Patient</title>
</head>
<body>

<h2>Edit Patient</h2>

<form method="POST">

    <input type="text" name="full_name"
           value="{{ patient.full_name }}" required><br><br>

    <input type="email" name="email"
           value="{{ patient.email }}" required><br><br>

    <input type="number" step="0.1" name="glucose"
           value="{{ patient.glucose }}" required><br><br>

    <input type="number" step="0.1" name="haemoglobin"
           value="{{ patient.haemoglobin }}" required><br><br>

    <input type="number" step="0.1" name="cholesterol"
           value="{{ patient.cholesterol }}" required><br><br>

    <button type="submit">Update Patient</button>

</form>

</body>
</html>
